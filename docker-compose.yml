version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: deepsentrix-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.example
    volumes:
      - backend_uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: deepsentrix-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_uploads:
